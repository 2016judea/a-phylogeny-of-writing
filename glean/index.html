<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLEAN — a field journal</title>
  <meta name="description" content="GLEAN, a field journal. Issues, read online." />
  <meta property="og:title" content="GLEAN — a field journal" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,ital,wght@6..96,0,500;6..96,0,700;6..96,1,500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0c;
      --bg-soft: #141416;
      --ink: #ece7dd;
      --ink-dim: #8b867d;
      --accent: #e8542b;
      --line: rgba(236, 231, 221, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Geist Mono', monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wrap { max-width: 920px; margin: 0 auto; padding: 28px 28px 80px; }
    @media (max-width: 540px) { .wrap { padding: 20px 16px 56px; } }

    .top {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 16px; padding-bottom: 80px;
    }
    @media (max-width: 540px) { .top { padding-bottom: 48px; } }

    .back {
      font-size: 12px; letter-spacing: 0.08em; color: var(--ink-dim);
      text-decoration: none; transition: color 0.2s;
    }
    .back:hover { color: var(--ink); }

    .hero { text-align: center; padding-bottom: 72px; }
    .hero-mast {
      font-family: 'Bodoni Moda', Georgia, serif;
      font-weight: 700;
      font-size: clamp(64px, 16vw, 132px);
      line-height: 0.92;
      letter-spacing: 0.005em;
    }
    .hero-mast .dot { color: var(--accent); }
    .hero-sub {
      font-family: 'Bodoni Moda', Georgia, serif;
      font-style: italic; font-weight: 500;
      font-size: clamp(18px, 4vw, 24px);
      color: var(--ink-dim);
      margin-top: 14px;
    }
    .hero-line {
      max-width: 540px; margin: 26px auto 0;
      font-size: 13px; line-height: 1.7; color: var(--ink-dim);
      letter-spacing: 0.01em;
    }

    .issues-label {
      font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--ink-dim); padding-bottom: 22px;
      border-bottom: 0.5px solid var(--line); margin-bottom: 28px;
    }

    .issue {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 28px;
      align-items: center;
      text-decoration: none;
      color: inherit;
      padding: 22px;
      border: 0.5px solid var(--line);
      border-radius: 8px;
      background: var(--bg-soft);
      transition: border-color 0.2s, transform 0.2s;
    }
    .issue:hover { border-color: rgba(236,231,221,0.28); transform: translateY(-2px); }

    .issue-cover {
      width: 150px; height: auto; border-radius: 2px; display: block;
      box-shadow: 0 10px 28px rgba(0,0,0,0.5);
    }
    .issue-no {
      font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent);
    }
    .issue-title {
      font-family: 'Bodoni Moda', Georgia, serif; font-weight: 700;
      font-size: 30px; margin: 6px 0 8px; line-height: 1.05;
    }
    .issue-meta { font-size: 12px; color: var(--ink-dim); letter-spacing: 0.04em; }
    .issue-read {
      display: inline-block; margin-top: 16px;
      font-size: 12px; letter-spacing: 0.08em; color: var(--ink);
      border-bottom: 1px solid var(--accent); padding-bottom: 2px;
    }

    @media (max-width: 540px) {
      .issue { grid-template-columns: 96px 1fr; gap: 16px; padding: 16px; }
      .issue-cover { width: 96px; }
      .issue-title { font-size: 23px; }
    }

    .foot {
      margin-top: 56px; padding-top: 24px; border-top: 0.5px solid var(--line);
      font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-dim);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span></span>
      <a class="back" href="https://aidanjude.vercel.app/">← aidan</a>
    </div>

    <header class="hero">
      <div class="hero-mast">GLEAN<span class="dot">.</span></div>
      <div class="hero-sub">a field journal</div>
      <p class="hero-line">
        A printed journal of essays, photographs, and field notes. Issues are mailed to friends first;
        the web editions live here.
      </p>
    </header>

    <main>
      <div class="issues-label">Issues</div>

      <a class="issue" href="issue-01/">
        <img class="issue-cover" src="issue-01/cover.webp" alt="GLEAN Issue №1 cover" />
        <div class="issue-body">
          <div class="issue-no">Issue №1</div>
          <div class="issue-title">Spring 2026</div>
          <div class="issue-meta">20 pages · a field journal</div>
          <span class="issue-read">read online →</span>
        </div>
      </a>
    </main>

    <div class="foot">GLEAN · free to friends</div>
  </div>
</body>
</html>
