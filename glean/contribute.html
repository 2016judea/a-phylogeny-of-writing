<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribute — GLEAN</title>
  <meta name="description" content="Send a piece to GLEAN — a printed field journal." />
  <meta property="og:site_name" content="Aidan Jude" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aidanjude.vercel.app/glean/contribute" />
  <meta property="og:title" content="Contribute — GLEAN" />
  <meta property="og:description" content="Send a piece to GLEAN — a printed field journal." />
  <meta property="og:image" content="https://aidanjude.vercel.app/og/glean.png" />
  <meta name="theme-color" content="#0b0b0c" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,ital,wght@6..96,0,500;6..96,0,700;6..96,1,500&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0c; --bg-soft: #141416; --ink: #ece7dd;
      --ink-dim: #8b867d; --accent: #e8542b; --line: rgba(236, 231, 221, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg); color: var(--ink);
      font-family: 'Geist Mono', monospace; min-height: 100vh;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 28px 28px 64px;
      display: flex; flex-direction: column; min-height: 100vh; }
    @media (max-width: 540px) { .wrap { padding: 20px 16px 48px; } }

    .top { display: flex; justify-content: space-between; align-items: baseline;
      gap: 14px 24px; padding-bottom: 36px; flex-wrap: wrap; }
    .brandlink { font-family: 'Bodoni Moda', Georgia, serif; font-style: italic;
      font-weight: 600; font-size: 18px; color: var(--ink); text-decoration: none; }
    .back { font-size: 12px; letter-spacing: 0.08em; color: var(--ink-dim); text-decoration: none; }
    .back:hover { color: var(--ink); }

    .lede { padding-bottom: 22px; }
    .lede h1 { font-family: 'Bodoni Moda', Georgia, serif; font-weight: 700;
      font-size: clamp(34px, 7vw, 52px); line-height: 1.0; }
    .lede h1 .dot { color: var(--accent); }
    .lede p { max-width: 560px; margin-top: 14px; font-size: 13px;
      line-height: 1.7; color: var(--ink-dim); }

    form { display: flex; flex-direction: column; flex: 1; }
    .meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta input { flex: 1; min-width: 200px; }
    input, textarea {
      background: var(--bg-soft); color: var(--ink); border: 0.5px solid var(--line);
      border-radius: 8px; font-family: 'Geist Mono', monospace; font-size: 14px;
      padding: 13px 15px; transition: border-color 0.2s; resize: none;
    }
    input::placeholder, textarea::placeholder { color: var(--ink-dim); }
    input:focus, textarea:focus { outline: none; border-color: var(--accent); }
    textarea { flex: 1; min-height: 320px; line-height: 1.7; }

    .row { display: flex; align-items: center; justify-content: space-between;
      gap: 16px; margin-top: 16px; flex-wrap: wrap; }
    .hint { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.04em; }
    button {
      background: var(--accent); color: #0b0b0c; border: none; border-radius: 8px;
      font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500;
      letter-spacing: 0.06em; padding: 13px 26px; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.45; cursor: default; }
    .status { font-size: 12px; letter-spacing: 0.03em; min-height: 16px; }
    .status.ok { color: var(--accent); }
    .status.err { color: #e8542b; }

    .sent { text-align: center; padding: 60px 0; }
    .sent h2 { font-family: 'Bodoni Moda', Georgia, serif; font-weight: 700;
      font-size: 38px; margin-bottom: 12px; }
    .sent p { color: var(--ink-dim); font-size: 13px; line-height: 1.7; }
    .sent a { color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="brandlink" href="/">Aidan&nbsp;Jude</a>
      <a class="back" href="/glean/">← glean</a>
    </div>

    <div class="lede">
      <h1>Send a piece<span class="dot">.</span></h1>
      <p>GLEAN is made by friends. Paste an essay, a poem, a field note, a photograph caption — anything you'd want in print. Nothing is automatic; I read every submission.</p>
    </div>

    <form id="form">
      <div class="meta">
        <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" />
        <input type="email" id="email" name="email" placeholder="Email (so I can reach you)" autocomplete="email" />
      </div>
      <textarea id="piece" name="piece" placeholder="Write or paste your piece here…" required></textarea>
      <div class="row">
        <span class="status" id="status"></span>
        <button type="submit" id="submit">Send to GLEAN</button>
      </div>
    </form>

    <div class="sent hidden" id="sent">
      <h2>Got it<span style="color:var(--accent)">.</span></h2>
      <p>Thank you — your piece landed in the GLEAN pile. I'll be in touch.<br /><a href="/glean/">← back to GLEAN</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const piece = document.getElementById('piece').value.trim();
      if (!piece) { statusEl.textContent = 'Nothing to send yet.'; statusEl.className = 'status err'; return; }

      submitBtn.disabled = true;
      statusEl.textContent = 'Sending…'; statusEl.className = 'status';

      try {
        const res = await fetch('/api/glean', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'contribute',
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            piece,
          }),
        });
        if (!res.ok) throw new Error((await res.json()).error || 'Something went wrong.');
        form.classList.add('hidden');
        document.getElementById('sent').classList.remove('hidden');
      } catch (err) {
        statusEl.textContent = err.message || 'Could not send. Try again.';
        statusEl.className = 'status err';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
