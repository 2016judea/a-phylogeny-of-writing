<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0c; --bg-soft:#141416; --ink:#ece7dd; --ink-dim:#8b867d;
      --accent:#e8542b; --line:rgba(236,231,221,0.12); --bar:58px; --foot:46px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--ink);
      font-family:'Geist Mono',monospace; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    /* top bar */
    .glean-bar { position:fixed; top:0; left:0; right:0; height:var(--bar); z-index:20;
      display:flex; align-items:center; justify-content:space-between; gap:16px; padding:0 24px;
      background:rgba(11,11,12,0.86); backdrop-filter:blur(10px); border-bottom:0.5px solid var(--line); }
    .masthead { font-family:'Bodoni Moda',Georgia,serif; font-weight:700; font-size:25px;
      letter-spacing:0.01em; color:var(--ink); text-decoration:none; line-height:1; }
    .masthead .dot { color:var(--accent); }
    .issue-tag { font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-dim); }
    @media (max-width:540px){ .glean-bar{padding:0 16px;} .masthead{font-size:20px;} .issue-tag{font-size:9px; letter-spacing:0.1em;} }

    /* stage */
    .stage { position:fixed; top:var(--bar); bottom:var(--foot); left:0; right:0;
      display:flex; align-items:center; justify-content:center; overflow:hidden; user-select:none; }
    .spread { display:flex; gap:8px; align-items:center; justify-content:center; }
    .spread img { display:block; width:auto; border-radius:2px; cursor:zoom-in;
      box-shadow:0 22px 60px rgba(0,0,0,0.6); background:var(--bg-soft); }
    @media (max-width:540px){ .spread{gap:0;} .spread img{box-shadow:0 12px 32px rgba(0,0,0,0.55);} }

    /* turn buttons */
    .turn { position:fixed; top:var(--bar); bottom:var(--foot); width:14%; max-width:120px; min-width:54px;
      z-index:15; border:none; background:transparent; color:var(--ink); cursor:pointer;
      display:flex; align-items:center; opacity:0.45; transition:opacity 0.2s; }
    .turn:hover { opacity:1; }
    .turn[disabled]{ opacity:0; pointer-events:none; }
    .turn.prev { left:0; justify-content:flex-start; padding-left:14px; }
    .turn.next { right:0; justify-content:flex-end; padding-right:14px; }
    .turn .chev { font-family:'Bodoni Moda',serif; font-size:34px; line-height:1;
      background:rgba(11,11,12,0.55); border:0.5px solid var(--line); border-radius:999px;
      width:44px; height:44px; display:flex; align-items:center; justify-content:center; }
    @media (max-width:540px){ .turn .chev{ width:38px; height:38px; font-size:28px; } }

    /* footer counter + hint */
    .stage-foot { position:fixed; bottom:0; left:0; right:0; height:var(--foot); z-index:16;
      display:flex; align-items:center; justify-content:space-between; padding:0 20px;
      font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-dim);
      border-top:0.5px solid var(--line); background:rgba(11,11,12,0.86); backdrop-filter:blur(10px); }
    .stage-foot a { color:var(--ink-dim); text-decoration:none; }
    .stage-foot a:hover { color:var(--ink); }
    .hint { font-style:normal; }
    @media (max-width:540px){ .hint{ display:none; } .stage-foot{ justify-content:space-between; } }

    /* lightbox (zoom) */
    .lightbox { position:fixed; inset:0; z-index:50; background:rgba(6,6,7,0.97); display:none;
      overflow:auto; cursor:zoom-out; -webkit-overflow-scrolling:touch; }
    .lightbox.open { display:block; }
    .lightbox img { display:block; margin:0 auto; width:auto; max-width:none; min-height:100%; }
    @media (max-width:900px){ .lightbox img{ width:100%; min-height:0; } }
    .lightbox-close { position:fixed; top:14px; right:18px; z-index:51; font-size:13px;
      letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-dim); background:rgba(11,11,12,0.7);
      border:0.5px solid var(--line); border-radius:999px; padding:7px 14px; cursor:pointer; }
  </style>
</head>
<body>
  <header class="glean-bar">
    <a class="masthead" href="/glean/">GLEAN<span class="dot">.</span></a>
    <span class="issue-tag">Issue №1 · Spring 2026</span>
  </header>

  <div class="stage" id="stage">
    <div class="spread" id="spread"></div>
  </div>

  <button class="turn prev" id="prev" aria-label="Previous page"><span class="chev">‹</span></button>
  <button class="turn next" id="next" aria-label="Next page"><span class="chev">›</span></button>

  <div class="stage-foot">
    <span id="counter">—</span>
    <span class="hint">← → or swipe to turn · tap to zoom</span>
    <a href="https://aidanjude.vercel.app/">aidan ↗</a>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">✕ close</span>
    <img id="lightbox-img" alt="" />
  </div>

  <script>
    // ── Issue config ──
    const PAGES = 20;
    const PW = 1241, PH = 1600, AR = PW / PH;   // page aspect (width/height)

    // Spreads are responsive: facing pairs on wide screens (cover alone, then 2-3,
    // 4-5, …), one page at a time on phones.
    const wideMQ = window.matchMedia('(min-width: 700px)');
    let isWide = wideMQ.matches;
    function buildSpreads(){
      const arr = [];
      if (isWide) {
        arr.push([1]);
        for (let p = 2; p <= PAGES; p += 2) arr.push(p + 1 <= PAGES ? [p, p + 1] : [p]);
      } else {
        for (let p = 1; p <= PAGES; p++) arr.push([p]);
      }
      return arr;
    }
    let spreads = buildSpreads();

    const stage = document.getElementById('stage');
    const spreadEl = document.getElementById('spread');
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    let view = 0;

    function src(n){ return '/glean/issue-01/pages/page-' + String(n).padStart(2,'0') + '.webp'; }

    function render(){
      const pages = spreads[view];
      spreadEl.innerHTML = '';
      pages.forEach(n => {
        const img = document.createElement('img');
        img.src = src(n);
        img.alt = 'GLEAN Issue №1 — page ' + n;
        img.decoding = 'async';
        img.addEventListener('click', () => openLightbox(img.src, img.alt));
        spreadEl.appendChild(img);
      });
      // preload neighbours
      [view-1, view+1].forEach(v => { if (spreads[v]) spreads[v].forEach(n => { const i=new Image(); i.src=src(n); }); });

      counter.textContent = (pages.length === 2 ? pages[0] + '–' + pages[1] : pages[0]) + ' / ' + PAGES;
      prevBtn.disabled = view === 0;
      nextBtn.disabled = view === spreads.length - 1;
      layout();
    }

    function layout(){
      const pages = spreads[view];
      const sw = stage.clientWidth - 24, sh = stage.clientHeight - 16;
      const spreadAR = pages.length * AR + (pages.length - 1) * 0.006; // include tiny gap
      let h = sh, w = sh * spreadAR;
      if (w > sw){ w = sw; h = sw / spreadAR; }
      spreadEl.querySelectorAll('img').forEach(im => { im.style.height = h + 'px'; });
    }

    function go(d){
      const nv = Math.min(Math.max(view + d, 0), spreads.length - 1);
      if (nv !== view){ view = nv; render(); }
    }

    prevBtn.addEventListener('click', () => go(-1));
    nextBtn.addEventListener('click', () => go(1));
    window.addEventListener('resize', () => {
      const nowWide = wideMQ.matches;
      if (nowWide !== isWide) {            // crossed the phone/desktop breakpoint
        const firstPage = spreads[view][0];
        isWide = nowWide;
        spreads = buildSpreads();
        view = spreads.findIndex(s => s.includes(firstPage));
        if (view < 0) view = 0;
        render();
      } else {
        layout();
      }
    });
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') go(1);
      else if (e.key === 'ArrowLeft') go(-1);
      else if (e.key === 'Escape') closeLightbox();
    });

    // swipe (horizontal)
    let tx = 0, ty = 0;
    stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
    stage.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
      if (Math.abs(dx) > 45 && Math.abs(dx) > Math.abs(dy)) go(dx < 0 ? 1 : -1);
    }, {passive:true});

    // lightbox
    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lightbox-img');
    function openLightbox(s, a){ lbImg.src=s; lbImg.alt=a; lb.classList.add('open'); lb.scrollTop=0; }
    function closeLightbox(){ lb.classList.remove('open'); lbImg.src=''; }
    lb.addEventListener('click', closeLightbox);
    document.getElementById('lightbox-close').addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });

    render();
  </script>
</body>
</html>
